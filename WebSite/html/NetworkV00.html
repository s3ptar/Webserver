<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Graph mit Beschriftungen</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            cursor: move;
        }
        .controls {
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Netzwerk mit Labels</h2>
        <p>Ziehe die Knoten, um die dynamische Beschriftung zu sehen.</p>
    </div>
    
    <canvas id="graphCanvas" width="800" height="500"></canvas>

    <script src="NetworkV00.js"></script>
</body>
</html>
